name: Автоматическое обновление конфигов

on:
  schedule:
    - cron: '0 * * * *'  # Каждый час
  workflow_dispatch:  # Ручной запуск
  push:
    branches: [ main ]

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp aiofiles requests
    
    - name: Create sources.txt
      run: |
        echo "https://raw.githubusercontent.com/arkanar/Configs/main/configs.txt" > sources.txt
        echo "https://raw.githubusercontent.com/MrOtherGit/Free-Configs/main/all_base64.txt" >> sources.txt
    
    - name: Run parser
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python beta.py --once
    
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add *.txt *.md *.json 2>/dev/null || true
        git add .github/workflows/*.yml 2>/dev/null || true
        git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Автоматическое обновление конфигов - $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
        git push || echo "Push failed or no changes"
